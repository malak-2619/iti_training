<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <title>Document</title>
</head>

<body>
    <div class="p-3 border border-primary rounded text-center mt-3 w-75 mx-auto">
        <h2>Registeration</h2>
        <form>
            <label for="name" class="pt-3">Name:</label>
            <input type="text" id="name" class="shadow rounded">
            <br>
            <label for="age" class="pt-3">Age:</label>
            <input type="number" class="shadow rounded" name="age" id="age">
            <br>
            <label for="job" class="pt-3">Job:</label>
            <input type="text" id="job" class="shadow rounded">
            <br>
            <button type="submit" class="btn btn-primary mt-3">Submit</button>
        </form>
    </div>

    <script src="../js/script13.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
</body>

</html>
